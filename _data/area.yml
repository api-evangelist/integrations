features:
- name: Pre-Built Connector Libraries
  description: Integration platforms ship hundreds to thousands of pre-built connectors
    so engineering teams can wire up SaaS systems without authoring custom HTTP clients
    for each provider.
- name: Visual Workflow Builders
  description: iPaaS and workflow automation tools like Zapier, Make, and n8n expose
    drag-and-drop or node-based canvases that let non-developers compose multi-step
    automations across APIs.
- name: Embedded Integration Marketplaces
  description: Embedded-iPaaS vendors like Paragon, Cobalt, and Integration.app give
    SaaS companies a white-labeled integration marketplace they can ship inside their
    own product.
- name: Unified API Normalization
  description: Unified API providers like Merge, Apideck, Nango, and StackOne collapse
    dozens of category-specific APIs (HRIS, CRM, ATS, accounting) into a single normalized
    schema and auth surface.
- name: Managed ETL and ELT Pipelines
  description: Data integration platforms like Fivetran, Airbyte, and Stitch land
    data from SaaS sources and databases into cloud warehouses on managed schedules
    with schema evolution handling.
- name: Reverse ETL and Operational Sync
  description: Reverse-ETL tools like Hightouch, Census, and Polytomic push warehouse-modeled
    data back out to SaaS systems of action so sales, marketing, and support teams
    can act on it.
- name: Workflow Orchestration and Scheduling
  description: Orchestration engines like Apache Airflow, Prefect, Dagster, and Kestra
    schedule, retry, and observe data and integration pipelines as declarative DAGs.
- name: Managed Authentication and Connection Storage
  description: Integration platforms handle OAuth dance, token refresh, secret rotation,
    and per-tenant connection storage so consuming applications never have to manage
    credentials directly.
use_cases:
- name: SaaS Product Integration Marketplace
  description: SaaS vendors use embedded iPaaS like Paragon, Cobalt, or Integration.app
    to ship an in-product "Integrations" tab that lets their customers connect to
    Salesforce, HubSpot, Slack, and Google Workspace without leaving the product.
- name: Unified HRIS and ATS Sync
  description: Applicant-tracking and HR-tech vendors use unified APIs like Merge,
    Kombo, or Knit to onboard customers running BambooHR, Workday, ADP, and Greenhouse
    against a single normalized employee model.
- name: SaaS-to-Warehouse Data Replication
  description: Analytics and data teams use Fivetran, Airbyte, or Stitch to land Stripe,
    Salesforce, HubSpot, NetSuite, and PostgreSQL data into Snowflake, BigQuery, or
    Redshift on managed schedules.
- name: Reverse ETL for Customer 360
  description: Data teams use Hightouch, Census, or Polytomic to push warehouse-modeled
    customer segments back into Salesforce, HubSpot, Braze, and Intercom so go-to-market
    teams act on consistent definitions.
- name: Citizen-Developer Workflow Automation
  description: Operations and revenue-ops teams use Zapier, Make, n8n, or Pabbly Connect
    to glue together calendars, forms, CRMs, and Slack channels without writing code.
- name: Event-Driven Internal Pipelines
  description: Platform teams use n8n, Pipedream, Trigger.dev, Prefect, or Dagster
    to orchestrate event-driven internal workflows that span webhooks, queues, databases,
    and AI calls.
- name: Enterprise Application Integration
  description: Large enterprises use Boomi, MuleSoft, Informatica, SnapLogic, and
    TIBCO to connect ERP, CRM, on-premise databases, and message buses with governance,
    monitoring, and SLAs.
- name: AI Agent Tool and Action Integration
  description: AI-application teams use integration platforms and unified APIs to
    expose hundreds of SaaS actions as governed tools that agents can invoke with
    managed credentials and audit logs.
integrations:
- name: Zapier
  description: General-purpose workflow automation platform with 7,000+ connected
    apps and a no-code trigger/action builder used by millions of small businesses.
- name: Make
  description: Visual scenario builder (formerly Integromat) for multi-step, branching
    automations with strong data-transformation primitives.
- name: Workato
  description: Enterprise iPaaS and intelligent automation platform with strong recipes-as-code
    model and embedded offering.
- name: n8n
  description: Source-available, self-hostable workflow automation tool with code
    nodes and an open node ecosystem.
- name: MuleSoft
  description: Salesforce-owned enterprise iPaaS and API management platform built
    around the Anypoint Platform and DataWeave.
- name: Merge
  description: Unified API for HRIS, ATS, CRM, ticketing, accounting, and file-storage
    integrations across 200+ providers.
- name: Paragon
  description: Embedded iPaaS that ships an in-product integration marketplace and
    workflow builder for SaaS vendors.
- name: Fivetran
  description: Managed ELT platform that lands data from 500+ SaaS sources and databases
    into cloud warehouses with schema evolution.
- name: Airbyte
  description: Open-source ELT platform with a community connector marketplace and
    a managed cloud offering.
- name: Hightouch
  description: Reverse-ETL platform that syncs modeled warehouse data into SaaS systems
    of action across sales, marketing, and support.
- name: Apache Airflow
  description: Widely deployed open-source workflow orchestrator that defines pipelines
    as Python DAGs with rich scheduling and retry semantics.
- name: Nango
  description: Open-source unified API and managed authentication layer for OAuth
    integrations across 400+ apps.
